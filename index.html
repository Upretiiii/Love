<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>For My Love ❤️</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            overflow: hidden;
        }

        h1 {
            margin-top: 40px;
            font-size: 45px;
            color: white;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
        }

        #slideshow {
            width: 350px;
            height: 350px;
            margin: auto;
            margin-top: 30px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
        }

        #slideshow img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #message {
            margin-top: 30px;
            font-size: 22px;
            color: white;
            width: 70%;
            margin: auto;
            min-height: 120px;
        }

        #loveBtn {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            background: #ff4d6d;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            display: none;
        }

        /* Popup */
        #popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: #ff0066;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            font-size: 22px;
            z-index: 10;
        }

        /* hearts */
        .heart {
            position: absolute;
            color: red;
            animation: fall linear forwards;
            user-select: none;
            pointer-events: none;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh);
                opacity: 1;
            }

            100% {
                transform: translateY(110vh);
                opacity: 0;
            }
        }

        /* fireworks */
        .firework {
            position: absolute;
            width: 5px;
            height: 5px;
            background: yellow;
            border-radius: 50%;
        }
    </style>
</head>

<body>

    <h1>I Love You My Love ❤️</h1>

    <div id="slideshow">
        <img id="slide" src="pic1.jpg">
    </div>

    <div id="message"></div>

    <button id="loveBtn">Will you be mine forever? 💍</button>

    <audio id="music" loop>
        <source src="love.mp3" type="audio/mpeg">
    </audio>

    <div id="popup">YES! 💖 I will be yours forever ❤️</div>

    <script>
        /* ===== Music: Start on first tap anywhere ===== */
        document.body.addEventListener("click", function () {
            const music = document.getElementById("music");
            if (music.paused) {
                music.play();
                document.getElementById("loveBtn").style.display = "inline-block";
            }
        }, { once: true });

        /* ===== Slideshow ===== */
        let images = ["pic1.jpg", "pic2.jpg", "pic3.jpg", "pic4.jpg"];
        let i = 0;
        setInterval(() => {
            i++;
            if (i >= images.length) i = 0;
            document.getElementById("slide").src = images[i];
        }, 3000);

        /* ===== Typewriter Love Message ===== */
        let text = "You are the most beautiful part of my life. Every moment with you feels magical. I fall in love with you again every day. I love you forever ❤️";
        let index = 0;
        function type() {
            if (index < text.length) {
                document.getElementById("message").innerHTML += text.charAt(index);
                index++;
                setTimeout(type, 60);
            }
        }
        type();

        /* ===== Falling Hearts ===== */
        function createHeart() {
            let heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = (20 + Math.random() * 30) + "px";
            heart.style.animationDuration = (3 + Math.random() * 5) + "s";
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }
        setInterval(createHeart, 300);

        /* ===== Love Button Popup ===== */
        document.getElementById("loveBtn").onclick = function () {
            document.getElementById("popup").style.display = "block";
            launchFireworks();
        };

        /* ===== Fireworks Animation ===== */
        function launchFireworks() {
            for (let f = 0; f < 50; f++) {
                let fire = document.createElement("div");
                fire.classList.add("firework");
                fire.style.left = Math.random() * 100 + "vw";
                fire.style.top = Math.random() * 100 + "vh";
                fire.style.background = `hsl(${Math.random() * 360},100%,50%)`;
                fire.style.width = fire.style.height = Math.random() * 10 + 5 + "px";
                document.body.appendChild(fire);
                setTimeout(() => { fire.remove(); }, 1000);
            }
        }
        setInterval(launchFireworks, 2000);

    </script>

</body>

</html>
